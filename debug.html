<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug</title></head>
<body>
<pre id="out">Loading...</pre>
<script>
fetch('data.json?_=' + Date.now())
  .then(r => r.json())
  .then(d => {
    const rows = d.rows || [];
    const out  = [
      'fetch: OK',
      'meta: '   + JSON.stringify(d.meta),
      'rows.length: ' + rows.length,
    ];
    if (rows[0]) {
      const r = rows[0];
      out.push('ticker: '     + r.ticker);
      out.push('mfi_grade: '  + r.mfi_grade);
      out.push('change_pct: ' + r.change_pct);
      out.push('flip_price: ' + r.flip_price);
      try {
        const s = `${r.ticker} $${r.flip_price.toFixed(2)} chg:${r.change_pct.toFixed(2)}% mfi:${r.mfi.toFixed(1)}`;
        out.push('render test: ' + s);
      } catch(e) {
        out.push('render ERROR: ' + e.message);
      }
    }
    document.getElementById('out').textContent = out.join('\n');
  })
  .catch(e => {
    document.getElementById('out').textContent = 'FETCH ERROR: ' + e.message;
  });
</script>
</body>
</html>
