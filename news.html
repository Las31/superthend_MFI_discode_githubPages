<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Market News · SuperTrend × MFI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090d;--surface:#0e1117;--surface2:#13171f;
  --border:#1c2130;--border2:#252d3d;
  --accent:#00e5a0;--accent2:#ff6b35;--accent3:#7b6cff;
  --text:#dce3ef;--text2:#8a9ab8;--text3:#5a6a85;
  --up:#3ddc84;--down:#ff5c5c;
  --font:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;scrollbar-width:none}
html::-webkit-scrollbar{display:none}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;
  min-height:100vh;display:flex;flex-direction:column;
}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(180deg,transparent 0,transparent 3px,rgba(0,229,160,.012) 3px,rgba(0,229,160,.012) 4px);
  pointer-events:none;z-index:9000;
}

/* Header */
header{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  padding:14px 28px;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(0,229,160,.04) 0%,transparent 100%);
  flex-shrink:0;
}
.logo{
  font-family:'Syne',sans-serif;font-size:22px;text-transform:uppercase;
  color:#fff;letter-spacing:.5px;line-height:1.2;text-decoration:none;
  text-shadow:0 0 6px #00e5a0,0 0 14px #00e5a0,0 0 32px #00e5a0,0 0 60px rgba(197,197,197,.4);
  animation:neon-flicker 4s infinite;
}
.logo em.t{font-style:normal;color:#00e5a0;text-shadow:0 0 6px #00e5a0,0 0 18px #00e5a0,0 0 40px #00e5a0}
.logo em.x{font-style:normal;color:#7b6cff;text-shadow:0 0 6px #7b6cff,0 0 18px #7b6cff,0 0 40px #7b6cff}
@keyframes neon-flicker{0%,95%,100%{opacity:1}96%{opacity:.6}97%{opacity:1}98%{opacity:.4}99%{opacity:1}}
.header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.nav-link{
  font-size:11px;color:var(--text2);padding:5px 10px;
  border:1px solid var(--border2);text-decoration:none;
  letter-spacing:.5px;transition:all .15s;font-family:var(--font);
}
.nav-link:hover{color:var(--accent);border-color:var(--accent);background:rgba(0,229,160,.05)}
.nav-link.active{color:var(--accent);border-color:var(--accent);background:rgba(0,229,160,.08)}
.src-badge{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3)}
.src-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:dot-pulse 2s infinite}
@keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Stats bar */
#stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;overflow:hidden;
}
#stats-beam{
  position:absolute;left:0;right:0;height:60px;
  background:linear-gradient(180deg,transparent 0%,rgba(0,229,160,.015) 40%,rgba(0,229,160,.028) 50%,rgba(0,229,160,.015) 60%,transparent 100%);
  animation:beam 6s linear infinite;pointer-events:none;z-index:20;
}
@keyframes beam{0%{top:-60px}100%{top:100%}}
#stats-scanlines{
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.2) 2px,rgba(0,0,0,.2) 4px);
  pointer-events:none;z-index:19;
}
.stat{background:rgba(14,17,23,.92);padding:14px 16px 10px;text-align:center;position:relative;z-index:5}
.stat-n{font-family:var(--font);font-size:24px;font-weight:600;letter-spacing:2px;display:block;line-height:1}
.stat-l{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:6px;display:block}

/* Tab nav */
#tab-nav{
  display:flex;gap:0;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;padding:0 28px;
}
.tab-btn{
  font-family:var(--font);font-size:11px;letter-spacing:.8px;text-transform:uppercase;
  color:var(--text3);padding:11px 18px;border:none;background:transparent;
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;
  position:relative;top:1px;
}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Panel wrap */
#panel-wrap{flex:1;overflow-y:auto;padding:20px 28px;scrollbar-width:none}
#panel-wrap::-webkit-scrollbar{display:none}
.panel{display:none}.panel.active{display:block}

/* Section label */
.sec-label{
  font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:10px;margin-top:20px;
}
.sec-label:first-child{margin-top:0}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px}

/* Cloud */
.cloud{display:flex;flex-wrap:wrap;gap:7px;padding:4px 0}
.kw{border-radius:2px;font-weight:600;cursor:default;transition:opacity .15s;line-height:1}
.kw:hover{opacity:.7}

/* Heatmap */
.heat-days{display:flex;gap:3px;padding-left:84px;margin-bottom:5px}
.heat-day{width:32px;font-size:10px;color:var(--text3);text-align:center}
.heat-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.heat-lbl{font-size:11px;color:var(--text2);width:78px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.heat-cells{display:flex;gap:3px}
.heat-cell{width:32px;height:22px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:default;color:transparent;transition:color .15s}
.heat-cell:hover{color:var(--text)}

/* Topic grid */
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.topic-card{border:1px solid rgba(255,255,255,.06);padding:12px 14px}
.topic-title{font-size:13px;font-weight:600;margin-bottom:4px}
.topic-count{font-size:10px;margin-bottom:8px;opacity:.6;letter-spacing:.05em}
.topic-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.topic-tag{font-size:10px;padding:2px 7px;border-radius:2px;font-weight:600;letter-spacing:.03em}
.topic-news{font-size:11px;color:var(--text2);border-top:1px solid rgba(255,255,255,.06);padding-top:8px;line-height:1.65}
.topic-news-item{margin-bottom:3px;padding-left:10px;position:relative}
.topic-news-item::before{content:'·';position:absolute;left:0;color:var(--text3)}

/* Timeline */
.tl-row{display:grid;grid-template-columns:56px 1fr;gap:12px;margin-bottom:14px;align-items:start}
.tl-time{font-size:11px;color:var(--text3);padding-top:2px;text-align:right;letter-spacing:.05em}
.tl-body{border-left:1px solid var(--border2);padding-left:12px}
.tl-badge{display:inline-block;font-size:9px;font-weight:600;padding:2px 7px;letter-spacing:.05em;margin-bottom:4px}
.tl-hl{font-size:12px;color:var(--text);line-height:1.5}
.tl-meta{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.03em}

/* Screener table */
.scr-wrap{overflow-x:auto}
.scr-tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.scr-tbl th{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;text-align:left;padding:0 10px 8px;border-bottom:1px solid var(--border);font-weight:400}
.scr-tbl td{padding:8px 10px;border-bottom:1px solid rgba(28,33,48,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scr-tbl tr:last-child td{border-bottom:none}
.scr-tbl tr:hover td{background:rgba(0,229,160,.03)}
.c-ticker{width:64px}.c-company{}.c-price{width:80px}.c-chg{width:72px}.c-vol{width:72px}
.t-ticker{color:var(--accent);font-weight:600;letter-spacing:.5px}
.t-company{color:var(--text2)}
.t-price{color:var(--text);text-align:right}
.t-up{color:var(--up);font-weight:600;text-align:right}
.t-dn{color:var(--down);font-weight:600;text-align:right}
.t-vol{color:var(--text3);text-align:right}

/* Loading / error */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--text3);letter-spacing:.08em}
#error-msg{display:none;text-align:center;padding:40px 20px;font-size:12px;color:var(--down);letter-spacing:.05em}
.retry-btn{margin-top:12px;font-family:var(--font);font-size:11px;padding:6px 14px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;letter-spacing:.5px;transition:all .15s;display:inline-block}
.retry-btn:hover{color:var(--accent);border-color:var(--accent)}

/* Mobile */
@media(max-width:600px){
  header{padding:10px 14px}
  .logo{font-size:15px}
  #tab-nav{padding:0 14px;overflow-x:auto;scrollbar-width:none}
  #tab-nav::-webkit-scrollbar{display:none}
  .tab-btn{padding:10px 12px;font-size:10px}
  #panel-wrap{padding:14px}
  .topic-grid{grid-template-columns:1fr}
  #stats{grid-template-columns:repeat(2,1fr)}
  #scr-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">Super<em class="t">Trend</em> <em class="x">×</em> MFI</a>
  <div class="header-right">
    <a href="index.html"    class="nav-link">選股 →</a>
    <a href="news.html"     class="nav-link active">新聞 →</a>
    <a href="analysis.html" class="nav-link">分析 →</a>
    <span class="src-badge">
      <span class="src-dot"></span>
      <span id="news-time">載入中...</span>
    </span>
  </div>
</header>

<div id="stats">
  <div id="stats-beam"></div>
  <div id="stats-scanlines"></div>
  <div class="stat">
    <span class="stat-n" id="st-news" style="color:var(--accent)">—</span>
    <span class="stat-l">NEWS TODAY</span>
  </div>
  <div class="stat">
    <span class="stat-n" id="st-topic" style="color:var(--text);font-size:15px;letter-spacing:.5px">—</span>
    <span class="stat-l">TOP TOPIC</span>
  </div>
  <div class="stat">
    <span class="stat-n" id="st-gainer" style="color:var(--up);font-size:18px">—</span>
    <span class="stat-l">TOP GAINER</span>
  </div>
  <div class="stat">
    <span class="stat-n" id="st-loser" style="color:var(--down);font-size:18px">—</span>
    <span class="stat-l">TOP LOSER</span>
  </div>
</div>

<div id="tab-nav">
  <button class="tab-btn active" data-tab="keywords">熱門關鍵字</button>
  <button class="tab-btn" data-tab="topics">話題分群</button>
  <button class="tab-btn" data-tab="timeline">趨勢時間軸</button>
  <button class="tab-btn" data-tab="screener">Screener 排行</button>
</div>

<div id="panel-wrap">

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">LOADING MARKET DATA...</div>
  </div>
  <div id="error-msg">
    <div id="error-text">載入失敗</div>
    <button class="retry-btn" onclick="loadData()">RETRY</button>
  </div>

  <!-- Panel: Keywords -->
  <div class="panel" id="panel-keywords">
    <p class="sec-label">今日關鍵字詞雲（字體大小 = 出現頻率）</p>
    <div class="card"><div class="cloud" id="cloud"></div></div>
    <p class="sec-label">各話題熱度（近 5 日）</p>
    <div class="card">
      <div class="heat-days" id="heat-days"></div>
      <div id="heatmap"></div>
    </div>
  </div>

  <!-- Panel: Topics -->
  <div class="panel" id="panel-topics">
    <p class="sec-label">今日新聞話題分群</p>
    <div class="topic-grid" id="topic-grid"></div>
  </div>

  <!-- Panel: Timeline -->
  <div class="panel" id="panel-timeline">
    <p class="sec-label">今日市場事件時間軸</p>
    <div id="timeline"></div>
  </div>

  <!-- Panel: Screener -->
  <div class="panel" id="panel-screener">
    <div id="scr-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <p class="sec-label">S&amp;P 500 — 今日最大漲幅</p>
        <div class="card scr-wrap">
          <table class="scr-tbl" id="tbl-gainers"></table>
        </div>
      </div>
      <div>
        <p class="sec-label">S&amp;P 500 — 今日最大跌幅</p>
        <div class="card scr-wrap">
          <table class="scr-tbl" id="tbl-losers"></table>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ── 話題顏色 ──────────────────────────────────────────────────
const TC={
  '地緣政治':    {bg:'rgba(255,107,53,.1)', tc:'#ff6b35',tag:'rgba(255,107,53,.2)'},
  'AI & 半導體': {bg:'rgba(0,229,160,.08)',tc:'#00e5a0',tag:'rgba(0,229,160,.15)'},
  '聯準會 & 總經':{bg:'rgba(61,220,132,.08)',tc:'#3ddc84',tag:'rgba(61,220,132,.15)'},
  '外匯 & 債券': {bg:'rgba(123,108,255,.1)',tc:'#7b6cff',tag:'rgba(123,108,255,.18)'},
  '關稅 & 貿易戰':{bg:'rgba(255,92,92,.08)',tc:'#ff5c5c',tag:'rgba(255,92,92,.15)'},
  '企業財報':    {bg:'rgba(160,140,255,.08)',tc:'#a08cff',tag:'rgba(160,140,255,.15)'},
  '能源 & ESG':  {bg:'rgba(29,158,117,.08)',tc:'#1d9e75',tag:'rgba(29,158,117,.15)'},
  '監管 & 法律': {bg:'rgba(245,166,35,.08)',tc:'#f5a623',tag:'rgba(245,166,35,.15)'},
  '市場綜合':    {bg:'rgba(90,106,133,.08)',tc:'#8a9ab8',tag:'rgba(90,106,133,.15)'},
};
function gc(t){return TC[t]||TC['市場綜合']}

// ── Tab 切換 ──────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  });
});

// ── 工具函式 ──────────────────────────────────────────────────
function fmtVol(v){
  if(!v) return '—';
  if(v>=1e9) return (v/1e9).toFixed(1)+'B';
  if(v>=1e6) return (v/1e6).toFixed(1)+'M';
  if(v>=1e3) return (v/1e3).toFixed(0)+'K';
  return String(v);
}
function fmtPct(v){
  const s=(v*100).toFixed(1);
  return v>=0?'+'+s+'%':s+'%';
}

// ── 各區塊建構 ────────────────────────────────────────────────
function buildCloud(kws){
  if(!kws||!kws.length){document.getElementById('cloud').innerHTML='';return}
  const max=kws[0].f,min=kws[kws.length-1].f;
  document.getElementById('cloud').innerHTML=kws.map(k=>{
    const r=(k.f-min)/(max-min+1);
    const sz=Math.round(11+r*14);
    const c=gc(k.category);
    const pad=`${Math.round(3+r*4)}px ${Math.round(8+r*6)}px`;
    return `<span class="kw" style="font-size:${sz}px;background:${c.bg};color:${c.tc};padding:${pad}">${k.w} <span style="font-size:9px;opacity:.5">${k.f}</span></span>`;
  }).join('');
}

function buildHeatmap(hm){
  if(!hm||!hm.length) return;
  const DAYS=['週一','週二','週三','週四','今日'];
  document.getElementById('heat-days').innerHTML=DAYS.map(d=>`<span class="heat-day">${d}</span>`).join('');
  const mx=Math.max(...hm.flatMap(r=>r.vals))||1;
  document.getElementById('heatmap').innerHTML=hm.map(r=>{
    const c=gc(r.label);
    return `<div class="heat-row">
      <span class="heat-lbl" title="${r.label}">${r.label}</span>
      <div class="heat-cells">${r.vals.map(v=>{
        const a=(v/mx)*0.75+0.08;
        return `<div class="heat-cell" style="background:${c.tc};opacity:${a.toFixed(2)}" title="${v}則">${v}</div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function buildTopics(topics){
  if(!topics||!topics.length) return;
  document.getElementById('topic-grid').innerHTML=topics.map(t=>{
    const c=gc(t.title);
    return `<div class="topic-card" style="background:${c.bg}">
      <div class="topic-title" style="color:${c.tc}">${t.title}</div>
      <div class="topic-count" style="color:${c.tc}">${t.count} 則新聞</div>
      <div class="topic-tags">${(t.tags||[]).map(g=>`<span class="topic-tag" style="background:${c.tag};color:${c.tc}">${g}</span>`).join('')}</div>
      <div class="topic-news">${(t.news||[]).map(n=>`<div class="topic-news-item">${n}</div>`).join('')}</div>
    </div>`;
  }).join('');
}

function buildTimeline(tl){
  if(!tl||!tl.length) return;
  document.getElementById('timeline').innerHTML=tl.map(e=>{
    const c=gc(e.topic);
    return `<div class="tl-row">
      <div class="tl-time">${e.time}</div>
      <div class="tl-body">
        <span class="tl-badge" style="background:${c.bg};color:${c.tc}">${e.topic}</span>
        <div class="tl-hl">${e.hl}</div>
        <div class="tl-meta">${e.meta}</div>
      </div>
    </div>`;
  }).join('');
}

function buildScr(id,rows){
  const el=document.getElementById(id);
  if(!rows||!rows.length){el.innerHTML='';return}
  el.innerHTML=`<colgroup><col class="c-ticker"><col class="c-company"><col class="c-price"><col class="c-chg"><col class="c-vol"></colgroup>
  <thead><tr>
    <th>Ticker</th><th>Company</th>
    <th style="text-align:right">Price</th>
    <th style="text-align:right">Chg%</th>
    <th style="text-align:right">Vol</th>
  </tr></thead><tbody>`+
  rows.map(r=>{
    const cls=r.Change>=0?'t-up':'t-dn';
    return `<tr>
      <td class="t-ticker">${r.Ticker}</td>
      <td class="t-company">${r.Company}</td>
      <td class="t-price">${'$'+r.Price.toFixed(2)}</td>
      <td class="${cls}">${fmtPct(r.Change)}</td>
      <td class="t-vol">${fmtVol(r.Volume)}</td>
    </tr>`;
  }).join('')+'</tbody>';
}

function updateStats(d){
  document.getElementById('st-news').textContent=d.news_count||'—';
  const topics=(d.topics||[]).filter(t=>t.title!=='市場綜合');
  document.getElementById('st-topic').textContent=topics.length?topics[0].title:'—';
  const gns=(d.screener||{}).top_gainers||[];
  const los=(d.screener||{}).top_losers ||[];
  if(gns.length) document.getElementById('st-gainer').textContent=`${gns[0].Ticker} ${fmtPct(gns[0].Change)}`;
  if(los.length) document.getElementById('st-loser').textContent=`${los[0].Ticker} ${fmtPct(los[0].Change)}`;
  const ts=d.generated_at||'';
  document.getElementById('news-time').textContent=
    `finvizfinance · ${ts.slice(0,10)} ${ts.slice(11,16)} UTC · ${d.news_count||0} articles`;
}

// ── 主載入 ────────────────────────────────────────────────────
async function loadData(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('error-msg').style.display='none';
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));

  try{
    const res=await fetch('data/dashboard_data.json?_='+Date.now());
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const d=await res.json();

    document.getElementById('loading').style.display='none';
    document.querySelector('.tab-btn[data-tab="keywords"]').classList.add('active');
    document.getElementById('panel-keywords').classList.add('active');

    updateStats(d);
    buildCloud(d.keywords||[]);
    buildHeatmap(d.heatmap||[]);
    buildTopics(d.topics||[]);
    buildTimeline(d.timeline||[]);
    buildScr('tbl-gainers',(d.screener||{}).top_gainers||[]);
    buildScr('tbl-losers', (d.screener||{}).top_losers ||[]);

  }catch(err){
    document.getElementById('loading').style.display='none';
    document.getElementById('error-msg').style.display='block';
    document.getElementById('error-text').textContent=`載入失敗：${err.message}`;
    console.error('[news.html]',err);
  }
}

loadData();
</script>
</body>
</html>
